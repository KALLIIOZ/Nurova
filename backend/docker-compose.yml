version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: nurova_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker_service:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: nurova_worker
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: uvicorn services.worker_service.main:app --host 0.0.0.0 --port 8001 --reload

  psychologist_service:
    build:
      context: .
      dockerfile: Dockerfile.psychologist
    container_name: nurova_psychologist
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WORKER_SERVICE_URL=http://worker_service:8001
    depends_on:
      redis:
        condition: service_healthy
      worker_service:
        condition: service_started
    volumes:
      - ./data:/app/data
    command: uvicorn services.psychologist_service.main:app --host 0.0.0.0 --port 8002 --reload

  manager_service:
    build:
      context: .
      dockerfile: Dockerfile.manager
    container_name: nurova_manager
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - REDIS_URL=redis://redis:6379/0
      - WORKER_SERVICE_URL=http://worker_service:8001
    depends_on:
      redis:
        condition: service_healthy
      worker_service:
        condition: service_started
    volumes:
      - ./data:/app/data
    command: uvicorn services.manager_service.main:app --host 0.0.0.0 --port 8003 --reload

  api_gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: nurova_gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WORKER_SERVICE_URL=http://worker_service:8001
      - PSYCHOLOGIST_SERVICE_URL=http://psychologist_service:8002
      - MANAGER_SERVICE_URL=http://manager_service:8003
    depends_on:
      redis:
        condition: service_healthy
      worker_service:
        condition: service_started
      psychologist_service:
        condition: service_started
      manager_service:
        condition: service_started
    volumes:
      - ./data:/app/data
    command: uvicorn api_gateway:app --host 0.0.0.0 --port 8000 --reload

volumes:
  redis_data:
